<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이미지 스타일 분류기</title>
    <style>
        body { font-family: sans-serif; margin: 40px; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; }
        .result-box { margin-top: 20px; }
        #outputImage { max-width: 100%; border: 1px solid #ddd; margin-top: 10px; display: none; }
        .feedback-box { margin-top: 30px; padding-top: 20px; border-top: 2px dashed #eee; }
        button { padding: 8px 15px; margin-right: 5px; cursor: pointer; }
        #feedbackResult { color: #28a745; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>이미지 스타일 분류 및 필터 처리</h2>
        
        <form id="uploadForm" onsubmit="processImage(event)">
            <input type="file" name="image" accept="image/*" required><br><br>
            
            <label for="filter_type">필터 선택:</label>
            <select name="filter_type" id="filter_type">
                <option value="grayscale">Grayscale</option>
                <option value="edge">Edge Detection</option>
                <option value="blur">Blur</option>
            </select><br><br>
            
            <button type="submit">이미지 처리 시작</button>
        </form>

        <div class="result-box">
            <h3 id="result"></h3>
            <img id="outputImage" alt="처리된 이미지">
        </div>

        <div class="feedback-box">
            <h3>예측 결과가 맞나요? 실제 정답을 알려주세요.</h3>
            <button onclick="sendFeedback('Bright')">정답: Bright</button>
            <button onclick="sendFeedback('Dark')">정답: Dark</button>
            <button onclick="sendFeedback('Edgy')">정답: Edgy</button>
            <p id="feedbackResult"></p>
        </div>
    </div>

    <script>
        let lastResult = null;

        function processImage(event) {
            event.preventDefault();
            const formData = new FormData(document.getElementById('uploadForm'));
            
            // 처리 중 메시지
            document.getElementById("result").innerText = "처리 중입니다...";
            document.getElementById("feedbackResult").innerText = "";
            document.getElementById("outputImage").style.display = "none";

            fetch('/process', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (!response.ok) throw new Error('서버 에러');
                
                // 백엔드에서 넘겨준 헤더 정보 추출
                const prediction = response.headers.get('X-ML-Prediction');
                const score = response.headers.get('X-ML-Score');
                const servingModel = response.headers.get('X-ML-Serving-Model');
                const filename = response.headers.get('X-Filename');

                // 화면에는 예측 결과와 확신도만 노출 (servingModel은 숨김)
                document.getElementById("result").innerText = `결과: ${prediction} (확신도: ${score})`;

                // 피드백 전송을 위해 백그라운드 변수에 상태 저장
                lastResult = {
                    filename: filename,
                    prediction: prediction,
                    score: score,
                    serving_model: servingModel
                };
                
                return response.blob();
            })
            .then(blob => {
                // 처리된 이미지 화면에 렌더링
                const url = URL.createObjectURL(blob);
                const imgElement = document.getElementById('outputImage');
                imgElement.src = url;
                imgElement.style.display = "block";
            })
            .catch(error => {
                document.getElementById("result").innerText = "처리 중 에러가 발생했습니다.";
            });
        }

        function sendFeedback(correctLabel) {
            if (!lastResult) {
                document.getElementById("feedbackResult").innerText = "먼저 이미지를 처리해 주세요.";
                document.getElementById("feedbackResult").style.color = "red";
                return;
            }

            fetch("/feedback", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    filename: lastResult.filename,
                    prediction: lastResult.prediction,
                    correct_label: correctLabel,
                    score: lastResult.score,
                    serving_model: lastResult.serving_model
                })
            })
            .then(res => {
                if (!res.ok) throw new Error('피드백 저장 실패');
                return res.json();
            })
            .then(data => {
                document.getElementById("feedbackResult").innerText = "피드백 저장 완료: " + correctLabel;
                document.getElementById("feedbackResult").style.color = "#28a745"; // 성공 초록색
            })
            .catch(() => {
                document.getElementById("feedbackResult").innerText = "피드백 저장에 실패했습니다.";
                document.getElementById("feedbackResult").style.color = "red"; // 실패 빨간색
            });
        }
    </script>
</body>
</html>
