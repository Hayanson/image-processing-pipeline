name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    # 참고: actions/checkout은 깃허브 액션의 공식 플러그인 이름이라 우리가 안 쓰기로 한 명령어와는 무관해.
    - name: 저장소 코드 불러오기
      uses: actions/checkout@v4
      
    - name: 파이썬 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        
    - name: 패키지 설치 및 환경 검증
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt